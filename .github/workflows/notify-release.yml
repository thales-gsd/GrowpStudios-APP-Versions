name: Notify Release by Email

on:
  release:
    types: [published]

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Enviar e-mails
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME:   ${{ github.repository }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          FROM_EMAIL:  ${{ secrets.SMTP_USERNAME }}
          SMTP_USER:   ${{ secrets.SMTP_USERNAME }}
          SMTP_PASS:   ${{ secrets.SMTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText

          smtp_server = os.environ["SMTP_SERVER"]
          smtp_port   = int(os.environ["SMTP_PORT"])
          from_email  = os.environ["FROM_EMAIL"]
          smtp_user   = os.environ["SMTP_USER"]
          smtp_pass   = os.environ["SMTP_PASS"]
          release_tag = os.environ["RELEASE_TAG"]
          release_url = os.environ["RELEASE_URL"]
          repo_name   = os.environ["REPO_NAME"]

          with open(".github/notify-emails.txt") as f:
              emails = [
                  line.strip() for line in f
                  if line.strip() and not line.startswith("#")
              ]

          body = f"""Ola,

          Uma nova versao do {repo_name} foi publicada!

          Versao:   {release_tag}
          Download: {release_url}

          Acesse o link acima para baixar os arquivos da release.

          Atenciosamente,
          Pipeline de Release"""

          with smtplib.SMTP(smtp_server, smtp_port) as server:
              server.starttls()
              server.login(smtp_user, smtp_pass)
              for email in emails:
                  msg = MIMEText(body, "plain", "utf-8")
                  msg["From"]    = from_email
                  msg["To"]      = email
                  msg["Subject"] = f"Nova release {release_tag} disponivel - {repo_name}"
                  server.sendmail(from_email, email, msg.as_string())
                  print(f"Enviado para: {email}")

          PYEOF
